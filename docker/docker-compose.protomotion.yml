services:
  protomotion:
    build:
      context: ..
      dockerfile: docker/Dockerfile.protomotion
    image: imnewtoken-protomotion:latest
    container_name: protomotion
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    privileged: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.docker.xauth
      - HOME=/workspace/home
      # Isaac Gym uses a custom arena allocator that glibc's heap checker
      # misidentifies as a double-free.  MALLOC_CHECK_=0 disables that check.
      - MALLOC_CHECK_=0
    volumes:
      - ${REPO_PATH:-/var/tmp/imnewtoken-docker}:/workspace/repo
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      # Expose all NVIDIA device nodes for CUDA-OpenGL interop
      - /dev:/dev
    working_dir: /workspace/repo/prepare7/ProtoMotions
    stdin_open: true
    tty: true
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, utility, compute]
